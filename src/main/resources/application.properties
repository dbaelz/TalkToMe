spring.application.name=TalkToMe

# Server bind address and port
# Can be overridden via environment variables SERVER_ADDRESS and SERVER_PORT
server.address=${SERVER_ADDRESS:127.0.0.1}
server.port=${SERVER_PORT:8080}

basic.auth.username=user
basic.auth.password=password

# ONNX runtime settings
onnx.use-gpu=true
onnx.gpu-device=0

# Storage for the generated output wav files
storage.path=storage

# Database for job persistence
spring.datasource.url=jdbc:h2:file:./data/ttm-db
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.datasource.username=dbuser
spring.datasource.password=dbpassword

# Thread executor config
tts.executor.core-pool-size=2
tts.executor.max-pool-size=4
tts.executor.queue-capacity=500
tts.executor.await-termination-seconds=30
tts.executor.thread-name-prefix=tts-exec-


### Models configuration

# Pocket TTS
tts.models.pocket-tts=models/pocket-tts
tts.models.pocket-tts.voice=voice.wav
tts.models.pocket-tts.tokenizer=tokenizer.model
tts.models.pocket-tts.encoder=mimi_encoder.onnx
tts.models.pocket-tts.text_conditioner=text_conditioner.onnx
tts.models.pocket-tts.flow_lm_main=flow_lm_main_int8.onnx
tts.models.pocket-tts.flow_lm_flow=flow_lm_flow_int8.onnx
tts.models.pocket-tts.decoder=mimi_decoder_int8.onnx